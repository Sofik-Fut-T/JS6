<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5x5 LightsOut - Random Mode</title>
    <style>
        /* Стилізація сторінки */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f0f4f8; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-top: 40px; 
        }

        h1 { color: #2c3e50; margin-bottom: 10px; }

        /* Плашка з назвою поточного рівня */
        #levelName {
            background: #3498db;
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            margin-bottom: 20px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .controls { margin-bottom: 25px; }

        button { 
            padding: 10px 25px; 
            font-size: 16px; 
            cursor: pointer; 
            background-color: #2ecc71; 
            color: white; 
            border: none; 
            border-radius: 8px;
            transition: background 0.3s;
        }

        button:hover { background-color: #27ae60; }

        /* Сітка гри */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(5, 60px); 
            grid-template-rows: repeat(5, 60px); 
            gap: 5px;
            background-color: #bdc3c7;
            padding: 5px;
            border-radius: 5px;
        }

        .cell { 
            width: 60px; 
            height: 60px; 
            background-color: #ecf0f1; 
            border-radius: 3px;
            cursor: pointer; 
            transition: background-color 0.2s, transform 0.1s; 
        }

        .cell:active { transform: scale(0.95); }

        /* Стиль для увімкненої клітинки */
        .cell.on { 
            background-color: #f1c40f; 
            box-shadow: inset 0 0 15px rgba(255,255,255,0.5);
        }

        /* Статистика */
        .stats { 
            margin-top: 25px; 
            display: flex; 
            gap: 30px; 
            font-size: 18px; 
            color: #34495e;
            border-top: 1px solid #eee;
            padding-top: 20px;
            width: 100%;
            justify-content: center;
        }

        .stats b { color: #e67e22; }
    </style>
</head>
<body>

    <h1>Lights Out 5x5</h1>
    <div id="levelName">Завантаження рівня...</div>
    
    <div class="game-container">
        <div class="controls">
            <button id="newGameBtn">Випадкова гра</button>
        </div>

        <div id="boardContainer" class="grid">
            </div>
        
        <div class="stats">
            <span>Ціль: <b id="targetText">0</b></span>
            <span>Кроків: <b id="movesText">0</b></span>
            <span>Час: <b id="timeText">0:00</b></span>
        </div>
    </div>

    <script>
        const boardContainer = document.getElementById('boardContainer');
        const targetText = document.getElementById('targetText');
        const movesText = document.getElementById('movesText');
        const timeText = document.getElementById('timeText');
        const newGameBtn = document.getElementById('newGameBtn');
        const levelNameText = document.getElementById('levelName');

        let boardData = [];
        let moves = 0;
        let targetMoves = 0;
        let timerId;
        let secondsElapsed = 0;

        // Функція завантаження гри через Ajax (Fetch)
        async function loadGame() {
            try {
                const response = await fetch('board.json');
                if (!response.ok) throw new Error("Файл не знайдено");
                
                const levelsArray = await response.json();
                
                // Рандомний вибір варіанту з JSON
                const randomIndex = Math.floor(Math.random() * levelsArray.length);
                const selectedLevel = levelsArray[randomIndex];
                
                // Налаштування даних
                levelNameText.textContent = selectedLevel.name;
                targetMoves = selectedLevel.target;
                boardData = JSON.parse(JSON.stringify(selectedLevel.board)); // Глибока копія
                
                resetStats();
                renderBoard();
                startTimer();
            } catch (error) {
                console.error("Помилка:", error);
                levelNameText.textContent = "Помилка завантаження JSON";
            }
        }

        // Динамічне створення елементів DOM
        function renderBoard() {
            boardContainer.innerHTML = ''; 
            for (let r = 0; r < 5; r++) {
                for (let c = 0; c < 5; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    if (boardData[r][c] === 1) cell.classList.add('on');
                    
                    cell.addEventListener('click', () => handleCellClick(r, c));
                    boardContainer.appendChild(cell);
                }
            }
        }

        function handleCellClick(r, c) {
            moves++;
            movesText.textContent = moves;
            
            // Перемикання себе та сусідів (хрестом)
            toggleCell(r, c);       
            toggleCell(r - 1, c);   
            toggleCell(r + 1, c);   
            toggleCell(r, c - 1);   
            toggleCell(r, c + 1);   

            renderBoard();
            checkWin();
        }

        function toggleCell(r, c) {
            // Перевірка меж масиву
            if (r >= 0 && r < 5 && c >= 0 && c < 5) {
                boardData[r][c] = boardData[r][c] === 1 ? 0 : 1;
            }
        }

        function checkWin() {
            // Перевірка, чи всі клітинки дорівнюють 0
            const isWin = boardData.every(row => row.every(cell => cell === 0));
            if (isWin) {
                clearInterval(timerId);
                setTimeout(() => {
                    alert(`Вітаємо! Перемога за ${moves} кроків!\nЦіль рівня була: ${targetMoves}`);
                }, 200);
            }
        }

        function resetStats() {
            moves = 0;
            secondsElapsed = 0;
            targetText.textContent = targetMoves;
            movesText.textContent = moves;
            updateTimeDisplay();
        }

        function startTimer() {
            clearInterval(timerId);
            timerId = setInterval(() => {
                secondsElapsed++;
                updateTimeDisplay();
            }, 1000);
        }

        function updateTimeDisplay() {
            const mins = Math.floor(secondsElapsed / 60);
            const secs = secondsElapsed % 60;
            timeText.textContent = `${mins}:${secs < 10 ? '0' + secs : secs}`;
        }

        newGameBtn.addEventListener('click', loadGame);
        window.addEventListener('DOMContentLoaded', loadGame);

    </script>
</body>
</html>
